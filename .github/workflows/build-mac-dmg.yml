name: Build Konnect Me macOS DMG

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: konnect-mac-dmg
  cancel-in-progress: true

env:
  RUSTDESK_TAG: "1.4.9"
  FLUTTER_VERSION: "3.24.5"
  MAC_RUST_VERSION: "1.81"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FRB_VERSION: "1.80.1"

jobs:
  build-dmg:
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: macos-14,        arch: aarch64, target: aarch64-apple-darwin, vcpkg-triplet: arm64-osx }
          - { os: macos-15-intel,  arch: x86_64,  target: x86_64-apple-darwin,  vcpkg-triplet: x64-osx  }
    runs-on: ${{ matrix.job.os }}
    env:
      MACOS_P12_BASE64: ${{ secrets.MACOS_P12_BASE64 }}
      MACOS_P12_PASSWORD: ${{ secrets.MACOS_P12_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout branding repo
        uses: actions/checkout@v4
        with:
          path: branding-repo

      - name: Import signing certificate (if configured)
        if: ${{ env.MACOS_P12_BASE64 != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_P12_PASSWORD }}

      - name: Clone RustDesk source
        run: git clone --depth 1 --branch "$RUSTDESK_TAG" --recurse-submodules https://github.com/rustdesk/rustdesk rustdesk

      - name: Apply Konnect Me branding
        working-directory: rustdesk
        run: bash "$GITHUB_WORKSPACE/branding-repo/apply-branding.sh" "$GITHUB_WORKSPACE/branding-repo/branding"

      - name: Install build runtime (exact libclang 15 for bindgen, create-dmg)
        run: |
          brew install create-dmg
          command -v pkg-config >/dev/null || brew install pkg-config
          # scrap uses bindgen 0.65, which emits opaque structs with libclang >= 16.
          # Pin the EXACT libclang 15.0.6 via pip wheel (same fix used on Windows).
          python3 -m pip install "libclang==15.0.6.1" --target "$HOME/libclang15" --break-system-packages \
            || python3 -m pip install "libclang==15.0.6.1" --target "$HOME/libclang15"
          DYL="$(find "$HOME/libclang15" -name 'libclang*.dylib' | head -1)"
          echo "libclang.dylib -> $DYL"
          echo "LIBCLANG_PATH=$(dirname "$DYL")" >> "$GITHUB_ENV"

      - name: Install NASM 2.16 (aom needs 2.x, not brew's 3.x)
        run: |
          wget -q https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip -q nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

      - name: Install Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter scheduler workaround
        run: |
          cd "$(dirname "$(which flutter)")"
          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' ../packages/flutter/lib/src/scheduler/binding.dart || true

      - name: Install Rust ${{ env.MAC_RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - name: Setup vcpkg (pinned)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        working-directory: rustdesk
        run: |
          "$VCPKG_ROOT/vcpkg" install --x-install-root="$VCPKG_ROOT/installed" || {
            find "$VCPKG_ROOT/" -name "*.log" -exec sh -c 'echo "== $1 =="; cat "$1"' _ {} \; ; exit 1; }

      # FFI bridge is pre-generated and installed by apply-branding.sh
      # (regenerating on the runner is fragile due to frb+libclang version coupling).

      - name: Build Konnect Me (.app)
        working-directory: rustdesk
        run: |
          if [ "${{ matrix.job.target }}" = "aarch64-apple-darwin" ]; then
            MIN_MACOS_VERSION="12.3"
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
            sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
            sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          fi
          # software codec only (no --hwcodec) — avoids the ffmpeg/bindgen path,
          # matching the Windows build. scrap uses pre-generated bindings.
          ./build.py --flutter --unix-file-copy-paste --screencapturekit 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: Rename to "Konnect Me" and create unsigned DMG (hdiutil, headless-safe)
        working-directory: rustdesk
        run: |
          exec > >(tee "$GITHUB_WORKSPACE/dmg.log") 2>&1
          set -x
          # macOS runners have NO GNU `timeout` command — provide a portable perl shim
          # (without this, every codesign call fails with "timeout: command not found"
          # and the app ships unsigned → Gatekeeper "damaged").
          timeout() { perl -e 'alarm(shift); exec(@ARGV)' "$@"; }
          PROD="flutter/build/macos/Build/Products/Release"
          echo "=== products dir ==="; ls -la "$PROD" || true
          find flutter/build -maxdepth 6 -name "*.app" -type d || true
          APP="$(ls -d "$PROD"/*.app 2>/dev/null | head -1)"
          if [ -z "$APP" ]; then echo "NO .app produced — flutter build macos failed"; exit 1; fi
          echo "built app bundle: $APP"
          if [ "$(basename "$APP")" != "Konnect Me.app" ]; then
            mv "$APP" "$PROD/Konnect Me.app"
          fi
          APP="$PROD/Konnect Me.app"
          PLIST="$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Konnect Me" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Konnect Me" "$PLIST" || true

          # --- code signing (if a Developer ID identity was imported) ---
          IDENTITY=$(security find-identity -v -p codesigning 2>/dev/null | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          if [ -n "$IDENTITY" ]; then
            echo "signing app with: $IDENTITY"
            # unlock keychains so codesign never blocks on a UI prompt
            security unlock-keychain -p "" login.keychain 2>/dev/null || true
            for kc in $(security list-keychains -d user | tr -d '"'); do security set-keychain-settings "$kc" 2>/dev/null || true; done
            ENT="flutter/macos/Runner/Release.entitlements"
            [ -f "$ENT" ] || ENT=""
            # Apple requires hardened runtime + secure timestamp on EVERY nested Mach-O,
            # signed inside-out (--deep is unreliable and rejected by notary). Sign
            # dylibs/.so, then frameworks, then nested app/xpc bundles, then the outer app.
            SIGN() { timeout 300 codesign --force --timestamp --options runtime --sign "$IDENTITY" "$@" 2>&1 || echo "  (sign warn: $*)"; }
            find "$APP/Contents" -type f \( -name "*.dylib" -o -name "*.so" \) -print0 2>/dev/null \
              | while IFS= read -r -d '' f; do SIGN "$f"; done
            if [ -d "$APP/Contents/Frameworks" ]; then
              for fw in "$APP/Contents/Frameworks/"*.framework; do [ -d "$fw" ] && SIGN "$fw"; done
              for dl in "$APP/Contents/Frameworks/"*.dylib;      do [ -e "$dl" ] && SIGN "$dl"; done
            fi
            find "$APP/Contents" -type d \( -name "*.app" -o -name "*.xpc" \) ! -path "$APP" -print0 2>/dev/null \
              | while IFS= read -r -d '' a; do SIGN "$a"; done
            # helper executables that sit loose in Contents/MacOS next to the main binary
            # (RustDesk ships a `service` helper here — Apple flags it if left unsigned).
            find "$APP/Contents/MacOS" -type f -print0 2>/dev/null \
              | while IFS= read -r -d '' x; do SIGN "$x"; done
            # outer bundle last, with entitlements so hardened runtime doesn't break Flutter's JIT
            if [ -n "$ENT" ]; then
              timeout 900 codesign --force --timestamp --options runtime --entitlements "$ENT" --sign "$IDENTITY" "$APP" \
                || { echo "codesign FAILED/timed out"; IDENTITY=""; }
            else
              timeout 900 codesign --force --timestamp --options runtime --sign "$IDENTITY" "$APP" \
                || { echo "codesign FAILED/timed out"; IDENTITY=""; }
            fi
            [ -n "$IDENTITY" ] && codesign --verify --deep --strict --verbose=2 "$APP" && echo "app signature OK"
          else
            echo "no signing identity — building UNSIGNED"
          fi

          # Plain compressed DMG with an Applications drop target (no AppleScript/Finder).
          STAGE="$(mktemp -d)"
          ditto "$APP" "$STAGE/Konnect Me.app"
          ln -s /Applications "$STAGE/Applications"
          DMG="$GITHUB_WORKSPACE/Konnect-Me-macos-${{ matrix.job.arch }}.dmg"
          hdiutil create -volname "Konnect Me" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          ls -la "$DMG"
          SZ=$(stat -f%z "$DMG")
          echo "DMG size: $SZ bytes"
          if [ "$SZ" -lt 5000000 ]; then echo "DMG too small ($SZ) — app bundle missing"; exit 1; fi

          # --- sign + (best-effort) notarize the DMG. NEVER fail the build on notary issues. ---
          NLOG="$GITHUB_WORKSPACE/notary-${{ matrix.job.arch }}.log"
          : > "$NLOG"
          if [ -n "$IDENTITY" ]; then
            timeout 300 codesign --force --timestamp --sign "$IDENTITY" "$DMG" || echo "dmg codesign non-fatal"
            if [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
              set +e
              echo "submitting to Apple notary…"
              timeout 2700 xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait --timeout 40m > "$NLOG" 2>&1
              cat "$NLOG"
              SID=$(grep -oiE 'id: [0-9a-f-]{36}' "$NLOG" | head -1 | awk '{print $NF}')
              if grep -q "status: Accepted" "$NLOG"; then
                xcrun stapler staple "$DMG" && echo "notarized + stapled ✅"
              else
                echo "not accepted — fetching detailed notary log (id=$SID)"
                [ -n "$SID" ] && xcrun notarytool log "$SID" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" >> "$NLOG" 2>&1
                cat "$NLOG"
              fi
              set -e
            fi
          fi

      - name: Capture logs to repo (always)
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE/branding-repo"
          A="${{ matrix.job.arch }}"
          { echo "### notary-$A.log ###"; cat "$GITHUB_WORKSPACE/notary-$A.log" 2>/dev/null; \
            echo; echo "### dmg.log tail ###"; tail -c 8000 "$GITHUB_WORKSPACE/dmg.log" 2>/dev/null; \
            echo; echo "### build.log tail ###"; tail -c 4000 "$GITHUB_WORKSPACE/build.log" 2>/dev/null; } > "ci-log-$A.txt"
          git config user.email "ci@rootkore.com"; git config user.name "ci"
          # pull-rebase to avoid races between the two matrix jobs pushing
          for i in 1 2 3 4 5; do
            git add "ci-log-$A.txt"
            git commit -m "CI log $A [skip ci]" || true
            git pull --rebase -q origin main 2>/dev/null || true
            git push origin main 2>/dev/null && break || sleep 3
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Konnect-Me-macos-${{ matrix.job.arch }}
          path: Konnect-Me-macos-*.dmg
          if-no-files-found: error

      - name: Publish DMG + notary log to a public Release (downloadable without login)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="macos-${{ matrix.job.arch }}"
          NLOG="$GITHUB_WORKSPACE/notary-${{ matrix.job.arch }}.log"
          DMG="$GITHUB_WORKSPACE/Konnect-Me-macos-${{ matrix.job.arch }}.dmg"
          [ -f "$NLOG" ] || echo "no notary log" > "$NLOG"
          # idempotent: ensure the release exists, then replace its assets in place
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "Konnect Me macOS (${{ matrix.job.arch }})" \
            --notes "Automated Konnect Me macOS build" 2>/dev/null || true
          [ -f "$DMG" ] && gh release upload "$TAG" "$DMG" --clobber --repo "$GITHUB_REPOSITORY"
          gh release upload "$TAG" "$NLOG" --clobber --repo "$GITHUB_REPOSITORY"
