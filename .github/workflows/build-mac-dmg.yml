name: Build Konnect Me macOS DMG

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  RUSTDESK_TAG: "1.4.9"
  FLUTTER_VERSION: "3.24.5"
  MAC_RUST_VERSION: "1.81"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FRB_VERSION: "1.80.1"

jobs:
  build-dmg:
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: macos-14,        arch: aarch64, target: aarch64-apple-darwin, vcpkg-triplet: arm64-osx }
          # Intel build (enable later if needed):
          # - { os: macos-15-intel, arch: x86_64,  target: x86_64-apple-darwin,  vcpkg-triplet: x64-osx  }
    runs-on: ${{ matrix.job.os }}
    steps:
      - name: Checkout branding repo
        uses: actions/checkout@v4
        with:
          path: branding-repo

      - name: Clone RustDesk source
        run: git clone --depth 1 --branch "$RUSTDESK_TAG" --recurse-submodules https://github.com/rustdesk/rustdesk rustdesk

      - name: Apply Konnect Me branding
        working-directory: rustdesk
        run: bash "$GITHUB_WORKSPACE/branding-repo/apply-branding.sh" "$GITHUB_WORKSPACE/branding-repo/branding"

      - name: Install build runtime (exact libclang 15 for bindgen, create-dmg)
        run: |
          brew install create-dmg
          command -v pkg-config >/dev/null || brew install pkg-config
          # scrap uses bindgen 0.65, which emits opaque structs with libclang >= 16.
          # Pin the EXACT libclang 15.0.6 via pip wheel (same fix used on Windows).
          python3 -m pip install "libclang==15.0.6.1" --target "$HOME/libclang15" --break-system-packages \
            || python3 -m pip install "libclang==15.0.6.1" --target "$HOME/libclang15"
          DYL="$(find "$HOME/libclang15" -name 'libclang*.dylib' | head -1)"
          echo "libclang.dylib -> $DYL"
          echo "LIBCLANG_PATH=$(dirname "$DYL")" >> "$GITHUB_ENV"

      - name: Install NASM 2.16 (aom needs 2.x, not brew's 3.x)
        run: |
          wget -q https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip -q nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

      - name: Install Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter scheduler workaround
        run: |
          cd "$(dirname "$(which flutter)")"
          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' ../packages/flutter/lib/src/scheduler/binding.dart || true

      - name: Install Rust ${{ env.MAC_RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - name: Setup vcpkg (pinned)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        working-directory: rustdesk
        run: |
          "$VCPKG_ROOT/vcpkg" install --x-install-root="$VCPKG_ROOT/installed" || {
            find "$VCPKG_ROOT/" -name "*.log" -exec sh -c 'echo "== $1 =="; cat "$1"' _ {} \; ; exit 1; }

      # FFI bridge is pre-generated and installed by apply-branding.sh
      # (regenerating on the runner is fragile due to frb+libclang version coupling).

      - name: Build Konnect Me (.app)
        working-directory: rustdesk
        run: |
          if [ "${{ matrix.job.target }}" = "aarch64-apple-darwin" ]; then
            MIN_MACOS_VERSION="12.3"
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
            sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
            sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          fi
          # software codec only (no --hwcodec) — avoids the ffmpeg/bindgen path,
          # matching the Windows build. scrap uses pre-generated bindings.
          ./build.py --flutter --unix-file-copy-paste --screencapturekit 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: Rename to "Konnect Me" and create unsigned DMG (hdiutil, headless-safe)
        working-directory: rustdesk
        run: |
          exec > >(tee "$GITHUB_WORKSPACE/dmg.log") 2>&1
          set -x
          PROD="flutter/build/macos/Build/Products/Release"
          APP="$(ls -d "$PROD"/*.app | head -1)"
          echo "built app bundle: $APP"
          if [ "$(basename "$APP")" != "Konnect Me.app" ]; then
            mv "$APP" "$PROD/Konnect Me.app"
          fi
          APP="$PROD/Konnect Me.app"
          PLIST="$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Konnect Me" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Konnect Me" "$PLIST" || true
          # Plain compressed DMG with an Applications drop target (no AppleScript/Finder).
          # Use ditto (preserves .app bundle symlinks; cp -R can corrupt them).
          STAGE="$(mktemp -d)"
          ditto "$APP" "$STAGE/Konnect Me.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Konnect Me" -srcfolder "$STAGE" -ov -format UDZO \
            "$GITHUB_WORKSPACE/Konnect-Me-macos-${{ matrix.job.arch }}.dmg"
          ls -la "$GITHUB_WORKSPACE"/Konnect-Me-macos-*.dmg

      - name: Capture logs to repo (on failure)
        if: failure()
        run: |
          cd "$GITHUB_WORKSPACE/branding-repo"
          { echo "### dmg.log ###"; tail -c 12000 "$GITHUB_WORKSPACE/dmg.log" 2>/dev/null; \
            echo; echo "### build.log tail ###"; tail -c 5000 "$GITHUB_WORKSPACE/build.log" 2>/dev/null; } > build-error.txt
          git config user.email "ci@rootkore.com"; git config user.name "ci"
          git add build-error.txt
          git commit -m "CI error capture [skip ci]" || true
          git push || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Konnect-Me-macos-${{ matrix.job.arch }}
          path: Konnect-Me-macos-*.dmg
          if-no-files-found: error
